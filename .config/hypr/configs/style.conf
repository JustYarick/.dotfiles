general {
    gaps_in = 5        # Отступы между окнами
    gaps_out = 10      # Отступы от краев экрана
    border_size = 2    # Толщина рамки окна
    col.active_border = rgba(689d6aff) rgba(d79921ff) 45deg
    col.inactive_border = rgba(504945ff)

    layout = dwindle
}

decoration {
    rounding = 0

    # Стандартные значения Omarchy: активное — сочное, неактивное — слегка приглушено
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
}

animations {
    enabled = true

    # Быстрые и плавные кривые
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 3, fluent_decel, popin 60%
    animation = border, 1, 5, default
    animation = fade, 1, 3, fluent_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, fluent_decel, slidevert
}

# Вложенный блок настроек для макета dwindle
dwindle {
    force_split = 2       # Новые окна всегда открываются СПРАВА или СНИЗУ
    preserve_split = true
}
