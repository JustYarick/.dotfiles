[opener]
edit = [{ run = 'nvim "$@"', desc = "Neovim", block = true }]

default = [{ run = 'xdg-open "$@"', desc = "Open", orphan = true }]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/xml", use = "edit" },
  { mime = "inode/x-empty", use = "edit" },

  { mime = "*", use = "default" },
]
